<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* StyleSnap brand — light-first per DESIGN.md (dark mode out of scope v1).
     The panel is a brand surface, so it deliberately ignores Figma's theme. */
  :root {
    --brand-primary: #5B2EFF;
    --brand-primary-hover: #4A21E0;
    --brand-primary-active: #3D17C2;
    --brand-accent: #FF4D8D;
    --surface-page: #FAF8F5;
    --surface-card: #FFFFFF;
    --text-primary: #14121F;
    --text-muted: #6B6878;
    --border-default: #14121F;
    --state-disabled-bg: #ECEAF2;
    --state-disabled-text: #A8A4B5;
    --error: #DC2626;
    --warning-text: #92400E;
    --success-text: #0E7A4E;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 500 12px/1.4 Inter, system-ui, sans-serif; /* caption scale */
    color: var(--text-primary);
    background: var(--surface-page);
    padding: 10px;
  }
  h1 {
    font: 700 20px/1.3 "Space Grotesk", Inter, sans-serif;
    margin-bottom: 12px;
  }
  h1 .dot { color: var(--brand-accent); }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 8px 0; text-align: center; cursor: pointer;
    border: 2px solid var(--border-default); border-radius: 8px;
    background: var(--surface-card); color: inherit; font: inherit; font-weight: 600;
  }
  .tab.active {
    background: var(--brand-primary);
    color: #fff;
    box-shadow: 4px 4px 0 0 var(--border-default);
  }
  .panel { display: none; }
  .panel.active { display: block; }
  button.primary {
    width: 100%; padding: 10px; margin-top: 16px; cursor: pointer;
    background: var(--brand-primary); color: #fff;
    border: 2px solid var(--border-default); border-radius: 14px;
    font: 600 12px/1.4 Inter, sans-serif;
    box-shadow: 4px 4px 0 0 var(--border-default);
    transition: transform 80ms, box-shadow 80ms, background 80ms;
  }
  button.primary:hover:not(:disabled) { background: var(--brand-primary-hover); }
  button.primary:active:not(:disabled) {
    background: var(--brand-primary-active);
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0 0 var(--border-default);
  }
  button.primary:disabled {
    background: var(--state-disabled-bg); color: var(--state-disabled-text);
    box-shadow: none; cursor: default;
  }
  button.primary + button.primary { margin-top: 8px; }
  .export-section-label {
    font: 600 10px/1.4 Inter, sans-serif;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .system-export-card {
    margin-top: 20px;
    padding: 12px;
    background: var(--surface-card);
    border: 2px dashed var(--border-default);
    border-radius: 14px;
  }
  .system-export-card p {
    color: var(--text-muted);
    font: 400 11px/1.4 Inter, sans-serif;
    margin-bottom: 10px;
  }
  button.system {
    width: 100%; padding: 10px; cursor: pointer;
    background: transparent;
    color: var(--brand-accent);
    border: 2px solid var(--brand-accent);
    border-radius: 14px;
    font: 600 12px/1.4 Inter, sans-serif;
    box-shadow: none;
    transition: transform 80ms, background 80ms, color 80ms;
  }
  button.system:hover {
    background: var(--brand-accent);
    color: #fff;
  }
  button.system:active {
    transform: translate(1px, 1px);
    background: #E03A78;
    border-color: #E03A78;
    color: #fff;
  }
  .status { margin-top: 10px; min-height: 16px; color: var(--text-muted); }
  .status.error { color: var(--error); }
  .status.warn { color: var(--warning-text); }
  textarea {
    width: 100%; height: 120px; resize: vertical;
    font: 400 10px/1.4 "JetBrains Mono", monospace;
    color: var(--text-primary); background: var(--surface-card);
    border: 2px solid var(--border-default); border-radius: 8px; padding: 8px;
  }
  textarea:focus { outline: 2px solid var(--brand-primary); outline-offset: 2px; }
  ul#token-list, ul#import-preview {
    list-style: none; max-height: 260px; overflow-y: auto; margin-top: 8px;
    padding: 0;
    background: var(--surface-card);
    border: 2px solid var(--border-default); border-radius: 10px;
    box-shadow: 4px 4px 0 0 var(--border-default);
  }
  ul#token-list:empty, ul#import-preview:empty { display: none; }
  ul#token-list li, ul#import-preview li {
    display: flex; align-items: center; gap: 4px; padding: 4px 6px;
    border-bottom: 1px solid #ECEAF2;
  }
  ul#token-list li:last-child, ul#import-preview li:last-child { border-bottom: none; }
  .tk-type {
    font: 500 8px/1.3 "JetBrains Mono", monospace; padding: 1px 4px; border-radius: 6px;
    background: var(--brand-primary); color: #fff; flex-shrink: 0;
  }
  .tk-swatch {
    width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
    border: 1px solid var(--border-default);
  }
  .tk-value {
    font: 400 10px/1.35 "JetBrains Mono", monospace;
    min-width: 0; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tk-source {
    margin-left: 4px; color: var(--text-muted); font-size: 8px; flex-shrink: 1;
    max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #export-hint { color: var(--text-muted); }
</style>
</head>
<body>
  <h1>StyleSnap<span class="dot">.</span></h1>

  <div class="tabs">
    <button class="tab active" data-panel="export">Export</button>
    <button class="tab" data-panel="import">Import</button>
  </div>

  <div id="panel-export" class="panel active">
    <div class="export-section-label">From selection</div>
    <div id="export-hint">Select a frame or component to extract tokens</div>
    <ul id="token-list"></ul>
    <button class="primary" id="btn-extract" disabled>Extract tokens</button>
    <button class="primary" id="btn-copy" disabled>Copy to StyleSnap</button>
    <div class="status" id="export-status"></div>

    <div class="system-export-card">
      <div class="export-section-label">From file</div>
      <p>Send Variables &amp; Styles back to the web app (names + values).</p>
      <button type="button" class="system" id="btn-export-system">Export Variables &amp; Styles</button>
    </div>
  </div>

  <div id="panel-import" class="panel">
    <textarea id="import-json" placeholder="Paste cleaned JSON from the StyleSnap Webtool"></textarea>
    <ul id="import-preview"></ul>
    <button class="primary" id="btn-import" disabled>Create Styles &amp; Variables</button>
    <div class="status" id="import-status"></div>
  </div>

<script>
  let lastExport = null;

  const $ = (id) => document.getElementById(id);

  // Tab switching
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      tab.classList.add("active");
      $("panel-" + tab.dataset.panel).classList.add("active");
    });
  });

  // Sandbox → UI
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    switch (msg.type) {
      case "selection-changed":
        $("btn-extract").disabled = !msg.hasSelection;
        $("export-hint").textContent = msg.hasSelection
          ? "Ready — click Extract tokens"
          : "Select a frame or component to extract tokens";
        break;
      case "extraction-result":
        lastExport = msg.payload;
        $("btn-copy").disabled = false;
        renderTokenList(msg.payload.tokens);
        $("export-status").className = "status";
        $("export-status").textContent =
          msg.payload.tokens.length + " tokens extracted";
        break;
      case "extraction-empty":
        $("export-status").className = "status";
        $("export-status").textContent = "No tokens found in this selection";
        break;
      case "system-export-result":
        lastExport = msg.payload;
        $("btn-copy").disabled = false;
        renderTokenList(msg.payload.tokens);
        {
          const status = $("export-status");
          let text = msg.payload.tokens.length + " tokens from Variables & Styles";
          if (msg.warning) {
            status.className = "status warn";
            text += " · " + msg.warning;
          } else {
            status.className = "status";
          }
          status.textContent = text;
        }
        break;
      case "system-export-empty":
        lastExport = null;
        $("btn-copy").disabled = true;
        renderTokenList([]);
        {
          const status = $("export-status");
          status.className = "status warn";
          status.textContent = msg.warning || "Nothing to export — no Styles or StyleSnap Variables found";
        }
        break;
      case "import-preview": {
        renderImportPreview(msg.entries);
        $("btn-import").disabled = msg.entries.length === 0;
        const status = $("import-status");
        status.className = "status";
        let text = msg.entries.length + " to create";
        if (msg.skippedUnnamed > 0) text += " · " + msg.skippedUnnamed + " unnamed skipped";
        if (msg.handoffWarning) {
          status.className = "status warn";
          text += " · " + msg.handoffWarning;
        } else if (msg.versionWarning) {
          status.className = "status warn";
          text += " · " + msg.versionWarning;
        }
        status.textContent = text;
        break;
      }
      case "create-done": {
        const status = $("import-status");
        let text = "✓ " + msg.created + " created";
        if (msg.skipped > 0) text += " · " + msg.skipped + " skipped (already existed or unnamed)";
        if (msg.warning) {
          status.className = "status warn";
          text += " · " + msg.warning;
        } else if (msg.errors.length > 0) {
          status.className = "status warn";
          text += " · " + msg.errors.length + " failed: " + msg.errors[0];
        } else {
          status.className = "status";
        }
        if (msg.errors.length > 0 && !msg.warning) {
          status.className = "status warn";
        }
        status.textContent = text;
        break;
      }
      case "import-invalid": {
        renderImportPreview([]);
        $("btn-import").disabled = true;
        const status = $("import-status");
        status.className = "status error";
        status.textContent = msg.error + (msg.details.length ? " — " + msg.details[0] : "");
        break;
      }
    }
  };

  function tokenValueLabel(t) {
    switch (t.type) {
      case "color": return t.value + (t.opacity < 1 ? " @ " + Math.round(t.opacity * 100) + "%" : "");
      case "gradient": return t.value.kind + ", " + t.value.stops.length + " stops";
      case "typography": return t.value.fontFamily + " " + t.value.fontSize + "/" + t.value.lineHeight + " w" + t.value.fontWeight;
      case "shadow": return t.value.length + " layer" + (t.value.length > 1 ? "s" : "");
      default: return t.value + "px";
    }
  }

  function renderTokenList(tokens) {
    const list = $("token-list");
    list.textContent = "";
    for (const t of tokens) {
      const li = document.createElement("li");

      const type = document.createElement("span");
      type.className = "tk-type";
      type.textContent = t.type;
      li.appendChild(type);

      if (t.type === "color") {
        const swatch = document.createElement("span");
        swatch.className = "tk-swatch";
        swatch.style.background = t.value;
        li.appendChild(swatch);
      }

      const label = (t.name || (t.context && t.context.authoredName) || "").trim();
      const value = document.createElement("span");
      value.className = "tk-value";
      const detail = tokenValueLabel(t) + (t.occurrences > 1 ? " ×" + t.occurrences : "");
      value.textContent = label ? label + " · " + detail : detail;
      value.title = label ? label + " — " + detail : detail;
      li.appendChild(value);

      const source = document.createElement("span");
      source.className = "tk-source";
      source.textContent = t.source;
      source.title = t.source;
      li.appendChild(source);

      list.appendChild(li);
    }
  }

  // UI → sandbox
  const post = (msg) => parent.postMessage({ pluginMessage: msg }, "*");

  $("btn-extract").addEventListener("click", () => {
    $("export-status").className = "status";
    $("export-status").textContent = "Extracting…";
    post({ type: "extract-tokens" });
  });

  $("btn-export-system").addEventListener("click", () => {
    $("export-status").className = "status";
    $("export-status").textContent = "Reading Variables & Styles…";
    $("btn-copy").disabled = true;
    post({ type: "export-system" });
  });

  $("btn-copy").addEventListener("click", () => {
    if (!lastExport) return;
    const json = JSON.stringify(lastExport, null, 2);
    // navigator.clipboard is unavailable in the plugin iframe — use execCommand
    const ta = document.createElement("textarea");
    ta.value = json;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    $("export-status").textContent = "✓ Copied — paste into StyleSnap Webtool";
  });

  function renderImportPreview(entries) {
    const list = $("import-preview");
    list.textContent = "";
    const kindLabel = {
      "paint-style": "paint",
      "text-style": "text",
      "effect-style": "effect",
      variable: "var",
      "variable-primitive": "prim",
      "variable-semantic": "sem",
    };
    for (const e of entries) {
      const li = document.createElement("li");

      const kind = document.createElement("span");
      kind.className = "tk-type";
      kind.textContent = kindLabel[e.kind] || e.kind;
      li.appendChild(kind);

      const name = document.createElement("span");
      name.className = "tk-value";
      name.textContent = e.name;
      li.appendChild(name);

      const value = document.createElement("span");
      value.className = "tk-source";
      value.textContent = e.valueLabel;
      value.title = e.valueLabel;
      li.appendChild(value);

      list.appendChild(li);
    }
  }

  let validateTimer = null;
  $("import-json").addEventListener("input", (e) => {
    const text = e.target.value.trim();
    clearTimeout(validateTimer);
    if (text.length === 0) {
      renderImportPreview([]);
      $("btn-import").disabled = true;
      $("import-status").textContent = "";
      $("import-status").className = "status";
      return;
    }
    // Debounce so we don't validate on every keystroke of a large paste.
    validateTimer = setTimeout(() => post({ type: "validate-import", json: text }), 300);
  });

  $("btn-import").addEventListener("click", () => {
    $("btn-import").disabled = true;
    $("import-status").className = "status";
    $("import-status").textContent = "Creating styles & variables…";
    post({ type: "create-import", json: $("import-json").value.trim() });
  });
</script>
</body>
</html>
