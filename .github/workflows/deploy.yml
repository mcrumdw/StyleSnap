# Deploy StyleSnap to Vercel on every push to main.
#
# One-time setup (GitHub → StyleSnap → Settings → Secrets → Actions):
#   Repository secret named exactly: VERCEL_TOKEN
#   Value: token from https://vercel.com/account/tokens
#
# If you also connected the repo in Vercel's dashboard, that's fine —
# this workflow is the reliable path; disable duplicate deploys in Vercel
# Git settings if both fire.

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_FFlpjNNbMP1pQAXP6fPgqe0W
      VERCEL_PROJECT_ID: prj_phz3wzNPIIVpvsHrdOuaV2pP4WzC
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Check VERCEL_TOKEN is set
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN repository secret is missing or empty."
            echo "Add it at: Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@55

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Verify production bundle
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          marker='Continue to colors'
          stale='index-6MiPuC3G.js'

          verify_host() {
            local base="$1"
            local label="$2"
            local html js tmp
            html=$(curl -fsSL "$base/")
            if echo "$html" | grep -q "$stale"; then
              echo "::error::$label still serves stale bundle $stale (pre-makram2)."
              echo "Disable Vercel Git auto-deploy for production — rely on this workflow only."
              return 1
            fi
            js=$(echo "$html" | sed -n 's/.*src="\/assets\/\(index-[^"]*\.js\)".*/\1/p' | head -1)
            if [ -z "$js" ]; then
              echo "::error::$label HTML missing JS bundle reference."
              return 1
            fi
            tmp=$(mktemp)
            curl -fsSL "$base/assets/$js" -o "$tmp"
            if ! grep -qF "$marker" "$tmp"; then
              echo "::error::$label bundle $js missing marker ($marker)."
              rm -f "$tmp"
              return 1
            fi
            rm -f "$tmp"
            echo "Verified $label serves $js with expected content."
          }

          # Deployment URL is ready immediately; production alias can lag briefly.
          verify_host "$DEPLOY_URL" "Deploy URL" || exit 1

          ok=0
          for attempt in 1 2 3 4 5 6; do
            if verify_host "https://stylesnap-lac.vercel.app" "Production alias"; then
              ok=1
              break
            fi
            echo "Alias not ready yet (attempt $attempt/6); waiting 10s…"
            sleep 10
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Production alias never served the expected bundle after retries."
            exit 1
          fi
