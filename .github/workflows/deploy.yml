# Deploy StyleSnap to Vercel on every push to main.
#
# One-time setup (GitHub → StyleSnap → Settings → Secrets → Actions):
#   Repository secret named exactly: VERCEL_TOKEN
#   Value: token from https://vercel.com/account/tokens
#
# If you also connected the repo in Vercel's dashboard, that's fine —
# this workflow is the reliable path; disable duplicate deploys in Vercel
# Git settings if both fire.

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_FFlpjNNbMP1pQAXP6fPgqe0W
      VERCEL_PROJECT_ID: prj_phz3wzNPIIVpvsHrdOuaV2pP4WzC
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Check VERCEL_TOKEN is set
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN repository secret is missing or empty."
            echo "Add it at: Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@55

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Verify local build marker
        run: |
          marker='Continue to colors'
          bundle=$(find .vercel/output/static/assets -name 'index-*.js' | head -1)
          if [ -z "$bundle" ]; then
            echo "::error::Local build missing assets/index-*.js"
            exit 1
          fi
          grep -qF "$marker" "$bundle" || {
            echo "::error::Local build $bundle missing marker ($marker)."
            exit 1
          }
          echo "Local build ok: $bundle"

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Verify production alias
        run: |
          # Unique *.vercel.app deploy URLs may hit Deployment Protection (SSO
          # interstitial) — only the public production alias is curl-able.
          marker='Continue to colors'
          stale='index-6MiPuC3G.js'
          base='https://stylesnap-lac.vercel.app'

          for attempt in 1 2 3 4 5 6 7 8; do
            html=$(curl -fsSL -H 'Cache-Control: no-cache' "$base/?v=$RANDOM")
            if echo "$html" | grep -q "$stale"; then
              echo "::error::Production still serves stale bundle $stale (pre-makram2)."
              echo "Disable Vercel Git auto-deploy for production — rely on this workflow only."
              exit 1
            fi
            js=$(echo "$html" | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            if [ -n "$js" ]; then
              tmp=$(mktemp)
              if curl -fsSL -H 'Cache-Control: no-cache' "$base/$js" -o "$tmp" \
                && grep -qF "$marker" "$tmp"; then
                rm -f "$tmp"
                echo "Verified production serves $js with expected content."
                exit 0
              fi
              rm -f "$tmp"
            fi
            echo "Alias not ready yet (attempt $attempt/8); waiting 10s…"
            sleep 10
          done
          echo "::error::Production alias never served the expected bundle after retries."
          exit 1
