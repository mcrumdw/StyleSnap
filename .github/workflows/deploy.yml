# Deploy StyleSnap to Vercel on every push to main.
#
# One-time setup (GitHub → StyleSnap → Settings → Secrets → Actions):
#   Repository secret named exactly: VERCEL_TOKEN
#   Value: token from https://vercel.com/account/tokens
#
# If you also connected the repo in Vercel's dashboard, that's fine —
# this workflow is the reliable path; disable duplicate deploys in Vercel
# Git settings if both fire.

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_FFlpjNNbMP1pQAXP6fPgqe0W
      VERCEL_PROJECT_ID: prj_phz3wzNPIIVpvsHrdOuaV2pP4WzC
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Check VERCEL_TOKEN is set
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN repository secret is missing or empty."
            echo "Add it at: Settings → Secrets and variables → Actions → Repository secrets"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@55

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Verify production bundle
        run: |
          html=$(curl -fsSL "https://stylesnap-lac.vercel.app/")
          if echo "$html" | grep -q 'index-6MiPuC3G.js'; then
            echo "::error::Production still serves stale bundle index-6MiPuC3G.js (pre-makram2)."
            echo "Disable Vercel Git auto-deploy for production — rely on this workflow only."
            exit 1
          fi
          js=$(echo "$html" | sed -n 's/.*src="\/assets\/\(index-[^"]*\.js\)".*/\1/p')
          if [ -z "$js" ]; then
            echo "::error::Production HTML missing JS bundle reference."
            exit 1
          fi
          bundle=$(curl -fsSL "https://stylesnap-lac.vercel.app/assets/$js")
          echo "$bundle" | grep -q 'Continue to colors' || {
            echo "::error::Production bundle missing makram2 marker (Continue to colors)."
            exit 1
          }
          echo "Verified production serves $js with makram2 content."
